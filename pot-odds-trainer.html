<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pot Odds Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00c853;
    --red: #ff3d3d;
    --gold: #f5c842;
    --bg: #0d1117;
    --card: #151c1f;
    --border: rgba(255,255,255,0.08);
    --muted: rgba(255,255,255,0.3);
  }

  body {
    background: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,80,30,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrapper { width: 100%; max-width: 540px; position: relative; z-index: 1; }

  /* Header */
  header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; color: #fff; letter-spacing: 0.05em; line-height: 1; }
  h1 span { color: var(--gold); }
  .subtitle { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

  /* Score bar */
  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .score-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .score-val { font-size: 1.6rem; font-weight: 600; color: #fff; line-height: 1; }
  .score-val.green { color: var(--green); }
  .score-val.red { color: var(--red); }
  .score-lbl { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

  /* Scenario panel */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  .panel-title {
    font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Scenario info */
  .scenario-info {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .info-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .info-label { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .info-value { font-size: 1.3rem; font-weight: 600; color: #fff; }
  .info-value.accent { color: var(--gold); }

  /* Hand description */
  .hand-desc {
    background: rgba(245,200,66,0.05);
    border: 1px solid rgba(245,200,66,0.15);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 0.75rem;
    line-height: 1.65;
    color: rgba(255,255,255,0.6);
  }
  .hand-desc strong { color: var(--gold); font-weight: 500; }

  /* Street badge */
  .street-badge {
    display: inline-block;
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.3);
    color: var(--gold);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
  }

  /* Answer buttons */
  .answer-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }

  .ans-btn {
    padding: 16px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.18s;
  }

  .ans-btn:hover:not(:disabled) { transform: translateY(-2px); }

  .ans-btn.call:hover:not(:disabled) { background: rgba(0,200,83,0.12); border-color: var(--green); color: var(--green); }
  .ans-btn.fold:hover:not(:disabled) { background: rgba(255,61,61,0.12); border-color: var(--red); color: var(--red); }
  .ans-btn.marginal:hover:not(:disabled) { background: rgba(245,200,66,0.12); border-color: var(--gold); color: var(--gold); }

  .ans-btn.correct { background: rgba(0,200,83,0.15); border-color: var(--green); color: var(--green); }
  .ans-btn.wrong { background: rgba(255,61,61,0.15); border-color: var(--red); color: var(--red); }
  .ans-btn.reveal { background: rgba(0,200,83,0.08); border-color: rgba(0,200,83,0.4); color: rgba(0,200,83,0.7); }
  .ans-btn:disabled { cursor: default; transform: none; opacity: 0.7; }

  /* Feedback */
  .feedback {
    border-radius: 12px;
    padding: 18px;
    margin-top: 12px;
    display: none;
    animation: slideIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(0,200,83,0.08); border: 1px solid rgba(0,200,83,0.25); }
  .feedback.wrong-fb { background: rgba(255,61,61,0.08); border: 1px solid rgba(255,61,61,0.25); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fb-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
  .fb-title.correct-fb { color: var(--green); }
  .fb-title.wrong-fb { color: var(--red); }
  .fb-body { font-size: 0.72rem; line-height: 1.7; color: rgba(255,255,255,0.55); }
  .fb-body strong { color: rgba(255,255,255,0.85); font-weight: 500; }

  /* Next btn */
  .next-btn {
    width: 100%;
    background: var(--gold);
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    color: #0d1117;
    cursor: pointer;
    margin-top: 10px;
    display: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn.show { display: block; }

  /* Streak */
  .streak-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .streak-badge {
    font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 999px; padding: 4px 12px;
    transition: all 0.3s;
  }
  .streak-badge.cold { color: var(--muted); background: transparent; border-color: var(--border); }

  /* Progress */
  .progress-bar-track {
    height: 3px; background: rgba(255,255,255,0.06); border-radius: 999px;
    margin-bottom: 16px; overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #ffe082);
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  @media (max-width: 420px) {
    .answer-row { grid-template-columns: 1fr; }
    .scenario-info { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div>
      <h1>Odds <span>Trainer</span></h1>
      <div class="subtitle">♦ Pot odds decision practice</div>
    </div>
  </header>

  <!-- Streak -->
  <div class="streak-row">
    <div class="streak-badge cold" id="streak-badge">🔥 Streak: 0</div>
  </div>

  <!-- Progress -->
  <div class="progress-bar-track">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-box">
      <div class="score-val" id="score-total">0</div>
      <div class="score-lbl">Hands Played</div>
    </div>
    <div class="score-box">
      <div class="score-val green" id="score-correct">0</div>
      <div class="score-lbl">Correct</div>
    </div>
    <div class="score-box">
      <div class="score-val" id="score-pct">—</div>
      <div class="score-lbl">Accuracy</div>
    </div>
  </div>

  <!-- Scenario -->
  <div class="panel">
    <div class="panel-title">Scenario</div>
    <div class="street-badge" id="street-badge">Turn</div>

    <div class="scenario-info">
      <div class="info-box">
        <div class="info-label">Pot Size</div>
        <div class="info-value accent" id="disp-pot">$—</div>
      </div>
      <div class="info-box">
        <div class="info-label">Villain's Bet</div>
        <div class="info-value accent" id="disp-bet">$—</div>
      </div>
      <div class="info-box">
        <div class="info-label">Your Outs</div>
        <div class="info-value" id="disp-outs">—</div>
      </div>
      <div class="info-box">
        <div class="info-label">To Call</div>
        <div class="info-value" id="disp-call">$—</div>
      </div>
    </div>

    <div class="hand-desc" id="hand-desc">Loading scenario...</div>

    <div class="answer-row">
      <button class="ans-btn call" id="btn-call" onclick="answer('call')">✓ Call</button>
      <button class="ans-btn marginal" id="btn-marginal" onclick="answer('marginal')">~ Close</button>
      <button class="ans-btn fold" id="btn-fold" onclick="answer('fold')">✗ Fold</button>
    </div>

    <div class="feedback" id="feedback">
      <div class="fb-title" id="fb-title"></div>
      <div class="fb-body" id="fb-body"></div>
    </div>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextScenario()">Next Hand →</button>

</div>

<script>
  // ─── State ───────────────────────────────────────────────
  let total = 0, correct = 0, streak = 0;
  let current = null;

  // ─── Scenario templates ──────────────────────────────────
  const DRAW_TYPES = [
    { name: 'flush draw', outs: 9,  desc: 'you hold two suited cards and two of your suit are on the board' },
    { name: 'open-ended straight draw', outs: 8, desc: 'you have four consecutive cards and need either end to complete your straight' },
    { name: 'gutshot straight draw', outs: 4, desc: 'you need one specific card in the middle to complete your straight' },
    { name: 'two overcards', outs: 6, desc: 'your two hole cards are both higher than the board — pairing either wins' },
    { name: 'combo flush + open-ended draw', outs: 15, desc: 'you have both a flush draw and an open-ended straight draw' },
    { name: 'combo flush + gutshot', outs: 12, desc: 'you have a flush draw plus a gutshot straight draw' },
    { name: 'one overcard', outs: 3, desc: 'you have one card higher than the board that would make top pair if it hits' },
  ];

  const POSITIONS = ['UTG', 'MP', 'CO', 'BTN', 'SB', 'BB'];
  const BOARDS = [
    'a rainbow board of K♠ 7♦ 2♣',
    'a two-tone board of J♥ 9♦ 4♥',
    'a paired board of Q♣ Q♦ 8♠',
    'a wet board of T♥ 8♥ 6♦',
    'a dry board of A♠ 5♦ 2♣',
    'a coordinated board of 9♦ 8♦ 7♣',
  ];

  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function generateScenario() {
    const street = Math.random() > 0.5 ? 'turn' : 'river';
    const unseen = street === 'turn' ? 47 : 46;
    const draw = pick(DRAW_TYPES);
    const pot = randInt(2, 20) * 10;        // $20–$200 in $10 steps
    // Random bet: varies from tiny to overbet
    const betMultiples = [0.25, 0.33, 0.5, 0.66, 0.75, 1.0, 1.5, 2.0];
    const betFrac = pick(betMultiples);
    const bet = Math.round(pot * betFrac / 5) * 5 || 10;
    const totalPot = pot + bet;
    const potOddsPct = (bet / (totalPot + bet)) * 100;
    const equityPct = (draw.outs / unseen) * 100;
    const diff = equityPct - potOddsPct;

    let correctAnswer, verdictLabel;
    if (diff > 3) { correctAnswer = 'call'; verdictLabel = 'CALL'; }
    else if (diff < -3) { correctAnswer = 'fold'; verdictLabel = 'FOLD'; }
    else { correctAnswer = 'marginal'; verdictLabel = 'MARGINAL'; }

    const position = pick(POSITIONS);
    const board = pick(BOARDS);

    return {
      street, unseen, draw, pot, bet, totalPot,
      potOddsPct, equityPct, diff,
      correctAnswer, verdictLabel,
      position, board
    };
  }

  function renderScenario(s) {
    document.getElementById('street-badge').textContent = s.street.charAt(0).toUpperCase() + s.street.slice(1);
    document.getElementById('disp-pot').textContent = '$' + s.pot;
    document.getElementById('disp-bet').textContent = '$' + s.bet;
    document.getElementById('disp-outs').textContent = s.draw.outs;
    document.getElementById('disp-call').textContent = '$' + s.bet;

    document.getElementById('hand-desc').innerHTML =
      `You're in <strong>${s.position}</strong> on the <strong>${s.street}</strong> facing a <strong>$${s.bet}</strong> bet into a <strong>$${s.pot}</strong> pot on <strong>${s.board}</strong>. You have a <strong>${s.draw.name}</strong> — ${s.draw.desc}.`;

    // Reset feedback & buttons
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('next-btn').className = 'next-btn';
    ['btn-call','btn-marginal','btn-fold'].forEach(id => {
      const b = document.getElementById(id);
      b.disabled = false;
      b.className = b.className.replace(/ correct| wrong| reveal/g, '');
    });
  }

  function answer(chosen) {
    if (!current) return;
    const s = current;

    // Disable buttons
    ['btn-call','btn-marginal','btn-fold'].forEach(id => document.getElementById(id).disabled = true);

    const btnMap = { call: 'btn-call', marginal: 'btn-marginal', fold: 'btn-fold' };
    const isCorrect = chosen === s.correctAnswer;

    // Style buttons
    document.getElementById(btnMap[chosen]).classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) document.getElementById(btnMap[s.correctAnswer]).classList.add('reveal');

    // Update score
    total++;
    if (isCorrect) { correct++; streak++; } else { streak = 0; }
    updateScore();

    // Feedback
    const fb = document.getElementById('feedback');
    const fbTitle = document.getElementById('fb-title');
    const fbBody = document.getElementById('fb-body');

    const potOdds = s.potOddsPct.toFixed(1);
    const equity = s.equityPct.toFixed(1);
    const ratio = (s.totalPot / s.bet).toFixed(1);
    const totalAfterCall = s.totalPot + s.bet;
    const ruleOfTwo = (s.draw.outs * 2).toFixed(0);

    if (isCorrect) {
      fb.className = 'feedback show correct-fb';
      fbTitle.className = 'fb-title correct-fb';
      fbTitle.textContent = '✓ Correct!';
    } else {
      fb.className = 'feedback show wrong-fb';
      fbTitle.className = 'fb-title wrong-fb';
      fbTitle.textContent = `✗ Wrong — correct answer: ${s.verdictLabel}`;
    }

    fbBody.innerHTML =
      `<strong>Pot odds:</strong> $${s.bet} to call into $${totalAfterCall} total → you need <strong>${potOdds}%</strong> equity (ratio ${ratio}:1).<br>` +
      `<strong>Your equity:</strong> ${s.draw.outs} outs ÷ ${s.unseen} unseen = <strong>${equity}%</strong> &nbsp;<em style="opacity:0.5">(Rule of 2: ${s.draw.outs}×2 = ~${ruleOfTwo}%)</em><br>` +
      (s.diff > 3
        ? `Your equity <strong>exceeds</strong> pot odds by <strong>+${s.diff.toFixed(1)}%</strong> — clear profitable call.`
        : s.diff < -3
        ? `Your equity <strong>falls short</strong> of pot odds by <strong>${Math.abs(s.diff).toFixed(1)}%</strong> — fold saves money long-term.`
        : `Within 3% — genuinely close spot. Consider <strong>position, reads, and implied odds</strong>.`);

    document.getElementById('next-btn').className = 'next-btn show';
  }

  function updateScore() {
    document.getElementById('score-total').textContent = total;
    document.getElementById('score-correct').textContent = correct;
    document.getElementById('score-pct').textContent = total > 0 ? Math.round((correct/total)*100) + '%' : '—';

    const streakEl = document.getElementById('streak-badge');
    streakEl.textContent = '🔥 Streak: ' + streak;
    streakEl.className = streak >= 3 ? 'streak-badge' : 'streak-badge cold';

    const pct = total > 0 ? Math.min((correct / Math.max(total, 10)) * 100, 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function nextScenario() {
    current = generateScenario();
    renderScenario(current);
  }

  // ─── Init ─────────────────────────────────────────────────
  nextScenario();
</script>
</body>
</html>
